<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🔍 Tìm Vật Khác Nhau</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0D1B2A;--card:#1B2A3B;--card2:#243447;
  --y:#FFD166;--g:#06D6A0;--r:#EF476F;--b:#118AB2;--p:#9B5DE5;--o:#FF9F1C;
  --white:#EEF2F7;--muted:#6C8099;
  --rad:22px;--radsm:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Nunito',system-ui,sans-serif;color:var(--white);}

/* animated star bg */
body::before{content:'';position:fixed;inset:0;
  background-image:radial-gradient(1.5px 1.5px at 15% 20%,rgba(255,255,255,.18) 0%,transparent 100%),
    radial-gradient(1px 1px at 40% 70%,rgba(255,255,255,.12) 0%,transparent 100%),
    radial-gradient(2px 2px at 75% 15%,rgba(255,255,255,.15) 0%,transparent 100%),
    radial-gradient(1px 1px at 85% 55%,rgba(255,255,255,.1) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 55% 90%,rgba(255,255,255,.14) 0%,transparent 100%);
  pointer-events:none;}

/* SCREENS */
.scr{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.scr.on{display:flex;}

/* ===== START ===== */
#start{justify-content:flex-start;gap:1.2rem;padding:2rem 1.4rem;}
.s-blob{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,var(--b),var(--p));display:flex;align-items:center;justify-content:center;font-size:3rem;box-shadow:0 0 40px rgba(17,138,178,.5);animation:blobPulse 3s ease-in-out infinite; flex-shrink: 0;}
@keyframes blobPulse{0%,100%{transform:scale(1);box-shadow:0 0 40px rgba(17,138,178,.5);}50%{transform:scale(1.06);box-shadow:0 0 60px rgba(17,138,178,.7);}};
.s-title{text-align:center; flex-shrink: 0;}
.s-title h1{font-size:1.8rem;font-weight:900;color:var(--y);letter-spacing:-.5px;}
.s-title p{font-size:.9rem;color:var(--muted);margin-top:5px;font-weight:700;}
.cat-label{font-size:.75rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px; flex-shrink: 0; margin-top: 10px;}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:400px; flex-shrink: 0;}
.cat-btn{padding:10px 12px;font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:800;border-radius:30px;border:2px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);color:var(--white);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;}
.cat-btn.on{border-color:var(--y);background:rgba(255,209,102,.15);color:var(--y);}
.cat-btn:active{transform:scale(.95);}
.go-btn{padding:16px 40px;font-family:'Nunito',sans-serif;font-size:1.2rem;font-weight:900;border:none;border-radius:40px;background:linear-gradient(135deg,var(--y),var(--o));color:#0D1B2A;cursor:pointer;box-shadow:0 8px 28px rgba(255,209,102,.4);transition:transform .12s; margin-top: 15px; margin-bottom: 30px; flex-shrink: 0;}
.go-btn:active{transform:scale(.94);}

/* ===== GAME ===== */
#game{justify-content:space-between;padding:0;overflow:hidden;}

/* HUD */
.hud{width:100%;display:flex;align-items:center;gap:10px;padding:.8rem 1.2rem .4rem;flex-shrink:0;}
.btn-back{font-size:1.2rem;background:rgba(255,255,255,.1);border:none;border-radius:12px;padding:6px 12px;color:var(--white);cursor:pointer;font-weight:800;}
.hud-prog{flex:1;height:10px;background:rgba(255,255,255,.08);border-radius:10px;overflow:hidden;}
.hud-prog-bar{height:100%;background:linear-gradient(90deg,var(--g),var(--b));border-radius:10px;transition:width .4s ease;}
.hud-score{font-size:1.1rem;font-weight:900;color:var(--y);white-space:nowrap;}

/* QUESTION HEADER */
.q-header{text-align:center;padding:.3rem 1rem;flex-shrink:0;}
.q-cat{font-size:.7rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;}
.q-text{font-size:1.1rem;font-weight:900;color:var(--white);margin-top:3px;}
.q-text span{color:var(--y);}

/* ITEMS GRID */
.items-area{flex:1;display:flex;align-items:center;justify-content:center;padding:.5rem 1rem;width:100%;}
.items-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:440px;}
.item-card{border-radius:var(--rad);background:var(--card);border:3px solid rgba(255,255,255,.08);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  padding:1.2rem .8rem;aspect-ratio:.9;position:relative;overflow:hidden;
  transition:transform .12s,border-color .15s,background .15s;box-shadow:0 4px 16px rgba(0,0,0,.25);}
.item-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.04),transparent);border-radius:inherit;}
.item-card:active{transform:scale(.93);}
.item-card .item-ico{font-size:3.2rem;line-height:1;transition:transform .2s;}
.item-card .item-lbl{font-size:.75rem;font-weight:800;color:var(--muted);text-align:center;}

/* card states */
.item-card.correct{border-color:var(--g);background:rgba(6,214,160,.12);animation:cardCorrect .5s ease;}
@keyframes cardCorrect{0%{transform:scale(1);}40%{transform:scale(1.1);}70%{transform:scale(.97);}100%{transform:scale(1);}};
.item-card.wrong{border-color:var(--r);background:rgba(239,71,111,.1);animation:cardWrong .4s ease;}
@keyframes cardWrong{0%,100%{transform:translateX(0);}25%{transform:translateX(-10px);}75%{transform:translateX(10px);}};
.item-card.reveal{border-color:var(--g);background:rgba(6,214,160,.12);}
.item-card.dim{opacity:.35;pointer-events:none;}

/* TICK / CROSS overlay */
.item-card .overlay{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:900;opacity:0;transition:opacity .25s;}
.item-card.correct .overlay,.item-card.reveal .overlay{opacity:1;background:var(--g);color:#0D1B2A;}
.item-card.wrong .overlay{opacity:1;background:var(--r);color:#fff;}

/* REASON BANNER */
.reason{width:100%;padding:.5rem 1.2rem;flex-shrink:0;text-align:center;}
.reason-box{background:var(--card2);border-radius:var(--radsm);padding:.7rem 1rem;display:inline-block;max-width:440px;width:100%;}
.reason-box .r-ico{font-size:1.3rem;margin-bottom:2px;}
.reason-box p{font-size:.82rem;font-weight:700;color:var(--white);line-height:1.4;}
.reason-box .r-why{font-size:.72rem;color:var(--muted);margin-top:3px;}

/* NEXT BTN */
.next-area{width:100%;padding:.6rem 1.2rem .9rem;flex-shrink:0;display:flex;justify-content:center; min-height: 70px;}
.btn-next{padding:14px 48px;font-family:'Nunito',sans-serif;font-size:1.05rem;font-weight:900;border:none;border-radius:30px;background:linear-gradient(135deg,var(--g),var(--b));color:#fff;cursor:pointer;box-shadow:0 6px 20px rgba(6,214,160,.35);display:none;transition:transform .1s;}
.btn-next:active{transform:scale(.95);}

/* CONFETTI */
.cp{position:fixed;width:9px;height:9px;border-radius:2px;pointer-events:none;z-index:300;animation:fall linear forwards;}
@keyframes fall{0%{opacity:1;transform:translateY(0) rotate(0);}100%{opacity:0;transform:translateY(110vh) rotate(800deg);}};

/* ===== RESULT ===== */
#result{justify-content:center;gap:1.4rem;padding:2rem 1.4rem;text-align:center;}
.res-ring{width:130px;height:130px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:4.5rem;animation:ringIn .5s ease;}
@keyframes ringIn{0%{transform:scale(0) rotate(-180deg);}100%{transform:scale(1) rotate(0);}};
.res-h1{font-size:2rem;font-weight:900;color:var(--y);}
.res-sub{font-size:.95rem;color:var(--muted);font-weight:700;}
.stars-row{display:flex;gap:6px;justify-content:center;}
.s-star{font-size:2.5rem;opacity:.25;transition:opacity .3s,transform .3s;}
.s-star.lit{opacity:1;transform:scale(1.15);}
.score-card{background:var(--card);border-radius:var(--rad);padding:1.2rem 2.2rem;border:2px solid rgba(255,255,255,.08);}
.score-big{font-size:3.2rem;font-weight:900;color:var(--g);}
.score-lbl{font-size:.82rem;color:var(--muted);font-weight:700;}
.res-btns{display:flex;gap:12px;}
.rb{padding:14px 28px;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:900;border:none;border-radius:30px;cursor:pointer;}
.rb.pri{background:linear-gradient(135deg,var(--y),var(--o));color:#0D1B2A;}
.rb.sec{background:rgba(255,255,255,.1);color:var(--white);border:2px solid rgba(255,255,255,.18);}
.rb:active{transform:scale(.95);}

/* LANDSCAPE */
@media(orientation:landscape)and(max-height:520px){
  .items-grid{grid-template-columns:repeat(4,1fr);max-width:600px;}
  .item-card{aspect-ratio:auto;padding:.8rem .5rem;min-height:90px;}
  .item-card .item-ico{font-size:2.4rem;}
}
</style>
</head>
<body>

<div id="start" class="scr on">
  <div class="s-blob">🔍</div>
  <div class="s-title">
    <h1>Tìm Vật Khác!</h1>
    <p>Chọn hình không cùng nhóm với các hình còn lại</p>
  </div>
  <div class="cat-label">Chọn 1 hoặc nhiều chủ đề:</div>
  <div class="cat-grid" id="cat-grid"></div>
  <button class="go-btn" onclick="startGame()">Bắt đầu chơi! 🚀</button>
</div>

<div id="game" class="scr">
  <div class="hud">
    <button class="btn-back" onclick="goStart()">◂</button>
    <div class="hud-prog"><div class="hud-prog-bar" id="prog-bar"></div></div>
    <div class="hud-score" id="hud-score">0 ⭐</div>
  </div>
  <div class="q-header">
    <div class="q-cat" id="q-cat"></div>
    <div class="q-text" id="q-text"></div>
  </div>
  <div class="items-area"><div class="items-grid" id="items-grid"></div></div>
  <div class="reason" id="reason-area" style="visibility:hidden">
    <div class="reason-box">
      <div class="r-ico" id="r-ico"></div>
      <p id="r-msg"></p>
      <div class="r-why" id="r-why"></div>
    </div>
  </div>
  <div class="next-area">
    <button class="btn-next" id="btn-next" onclick="nextQ()">Câu tiếp theo →</button>
  </div>
</div>

<div id="result" class="scr">
  <div class="res-ring" id="res-ring"></div>
  <div class="res-h1" id="res-h1"></div>
  <div class="res-sub" id="res-sub"></div>
  <div class="stars-row" id="stars-row"></div>
  <div class="score-card"><div class="score-big" id="score-big"></div><div class="score-lbl">Điểm số</div></div>
  <div class="res-btns">
    <button class="rb pri" onclick="startGame()">Chơi lại 🔁</button>
    <button class="rb sec" onclick="goStart()">Menu chính</button>
  </div>
</div>

      {items:[{e:'👟',n:'Giày thể thao'},{e:'👢',n:'Ủng'},{e:'🩴',n:'Dép lê'},{e:'🧤',n:'Găng tay'}],odd:3,reason:'🧤 Găng tay xỏ vào chân không vừa đâu nha!',why:'Ba món kia để mang vào đôi chân bé xinh'},
    ]
  },
  toys: {
    label:'🧸 Đồ chơi', color:'#4CC9F0',
    q: [
      {items:[{e:'🧸',n:'Gấu bông'},{e:'🪀',n:'Yoyo'},{e:'🪁',n:'Diều'},{e:'🧹',n:'Cái chổi'}],odd:3,reason:'🧹 Cầm chổi là phải đi quét nhà giúp mẹ thôi!',why:'Ba món kia là đồ chơi siêu vui'},
      {items:[{e:'🚗',n:'Xe ô tô nhỏ'},{e:'🚂',n:'Tàu hỏa gỗ'},{e:'✈️',n:'Máy bay nhựa'},{e:'🐊',n:'Cá sấu thật'}],odd:3,reason:'🐊 Cá sấu thật cắn đau lắm, không phải đồ chơi!',why:'Ba món kia là đồ chơi mô hình'},
      {items:[{e:'🧩',n:'Xếp hình'},{e:'🎲',n:'Xúc xắc'},{e:'🎮',n:'Máy game'},{e:'🧅',n:'Củ hành tây'}],odd:3,reason:'🧅 Bóc hành tây là cay chảy nước mắt luôn!',why:'Ba món kia bé chơi hoài không chán'},
    ]
  },
  home: {
    label:'🏠 Trong nhà', color:'#7209B7',
    q: [
      {items:[{e:'🛏️',n:'Cái giường'},{e:'🛋️',n:'Ghế sofa'},{e:'🪑',n:'Cái ghế'},{e:'🌵',n:'Xương rồng'}],odd:3,reason:'🌵 Ngồi lên xương rồng là thủng quần luôn đó!',why:'Ba món kia êm ái để bé ngồi hoặc nằm'},
      {items:[{e:'📺',n:'Tivi'},{e:'📻',n:'Radio'},{e:'💻',n:'Máy tính'},{e:'🍎',n:'Quả táo'}],odd:3,reason:'🍎 Quả táo ăn cái rộp là hết, đâu có cắm điện được!',why:'Ba món kia là đồ điện tử phát ra tiếng'},
      {items:[{e:'🛁',n:'Bồn tắm'},{e:'🚽',n:'Bồn cầu'},{e:'🚿',n:'Vòi sen'},{e:'🍳',n:'Cái chảo'}],odd:3,reason:'🍳 Chảo dùng để chiên trứng trong bếp cơ mà!',why:'Ba món kia đều nằm ngoan trong phòng tắm'},
    ]
  }
};

/* ===== STATE ===== */
let selectedCats = new Set(['animals','food','vehicles','toys','school']);
let score=0, qNum=0, total=10, pool=[], answered=false;

/* ===== INIT CATEGORIES ===== */
function initCats(){
  const g=document.getElementById('cat-grid');
  g.innerHTML='';
  Object.entries(CATS).forEach(([key,cat])=>{
    const b=document.createElement('button');
    b.className='cat-btn'+(selectedCats.has(key)?' on':'');
    b.innerHTML=`${cat.label}`;
    b.style.borderColor=selectedCats.has(key)?cat.color:'';
    b.style.background=selectedCats.has(key)?`rgba(${hexToRgb(cat.color)},.15)`:'';
    b.style.color=selectedCats.has(key)?cat.color:'';
    /* Đã sửa lỗi: Dùng onclick chuẩn thay vì event listeners phức tạp */
    b.onclick=()=>toggleCat(key,b,cat.color);
    g.appendChild(b);
  });
}
function hexToRgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`${r},${g},${b}`;}
function toggleCat(key,btn,col){
  if(selectedCats.has(key)){if(selectedCats.size<=1)return;selectedCats.delete(key);btn.classList.remove('on');btn.style.borderColor='';btn.style.background='';btn.style.color='';}
  else{selectedCats.add(key);btn.classList.add('on');btn.style.borderColor=col;btn.style.background=`rgba(${hexToRgb(col)},.15)`;btn.style.color=col;}
}

/* ===== HELPERS ===== */
const $=id=>document.getElementById(id);
const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};
function show(id){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));$(id).classList.add('on');}

/* ===== GAME FLOW ===== */
function startGame(){
  score=0; qNum=0; answered=false;
  pool=[];
  selectedCats.forEach(k=>{CATS[k].q.forEach(q=>pool.push({...q,catKey:k}));});
  pool=shuffle(pool);
  
  // Đảm bảo không vượt quá số lượng câu hỏi hiện có trong pool
  total = Math.min(10, pool.length);
  
  show('game');
  nextQ();
}

function goStart(){show('start');initCats();}

function nextQ(){
  if(qNum>=total){endGame();return;}
  answered=false;
  $('btn-next').style.display='none';
  $('reason-area').style.visibility='hidden';

  const q=pool[qNum];
  const cat=CATS[q.catKey];

  // Update HUD
  $('prog-bar').style.width=((qNum/total)*100)+'%';
  $('hud-score').textContent=score+' ⭐';
  $('q-cat').textContent=cat.label;
  $('q-text').innerHTML=`Hình nào <span>vô lý / không cùng nhóm</span>?`;

  const items=shuffle(q.items.map((it,i)=>({...it,isOdd:i===q.odd})));
  const grid=$('items-grid');
  grid.innerHTML='';

  items.forEach((item)=>{
    const card=document.createElement('div');
    card.className='item-card';
    card.innerHTML=`
      <div class="overlay">${item.isOdd?'✓':'✗'}</div>
      <div class="item-ico">${item.e}</div>
      <div class="item-lbl">${item.n}</div>`;
    
    /* Đã Fix lỗi chạm trên iOS: Dùng onclick thay vì pointerdown chặn event */
    card.onclick = () => { selectItem(item,card,items,q); };
    
    grid.appendChild(card);
  });
}

function selectItem(item,card,items,q){
  if(answered)return;
  answered=true;

  const correct=item.isOdd;
  const cards=document.querySelectorAll('.item-card');

  if(correct){
    card.classList.add('correct');
    cards.forEach(c=>{if(c!==card)c.classList.add('dim');});
    score++;
    confetti();
  }else{
    card.classList.add('wrong');
    setTimeout(()=>{
      cards.forEach(c=>{
        const hasOdd=c.querySelector('.item-ico').textContent===items.find(x=>x.isOdd).e;
        if(hasOdd)c.classList.add('reveal');
        else if(c!==card)c.classList.add('dim');
      });
    },600);
  }

  setTimeout(()=>{
    $('r-ico').textContent=correct?'🤣':'💡';
    $('r-msg').textContent=q.reason;
    $('r-why').textContent=q.why;
    $('reason-area').style.visibility='visible';
    $('hud-score').textContent=score+' ⭐';
    qNum++;
    $('prog-bar').style.width=((qNum/total)*100)+'%';
    $('btn-next').style.display='block';
  },correct?600:1200);
}

/* ===== CONFETTI ===== */
const CC=['#FFD166','#06D6A0','#EF476F','#118AB2','#9B5DE5','#FF9F1C'];
function confetti(){
  for(let i=0;i<30;i++){
    const el=document.createElement('div');
    el.className='cp';
    const sz=6+Math.random()*8;
    el.style.cssText=`width:${sz}px;height:${sz}px;background:${CC[Math.floor(Math.random()*CC.length)]};left:${20+Math.random()*60}%;top:${15+Math.random()*50}%;border-radius:${Math.random()>.5?'50%':'3px'};animation-duration:${.8+Math.random()*.8}s;animation-delay:${Math.random()*.2}s;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1800);
  }
}

/* ===== END GAME ===== */
function endGame(){
  show('result');
  const pct=score/total;
  let icon,h1,sub;
  if(pct>=.9){icon='🏆';h1='Siêu đỉnh!';sub='Con phát hiện ra điểm vô lý cực nhanh!';}
  else if(pct>=.7){icon='🌟';h1='Giỏi lắm!';sub='Con suy luận rất tốt!';}
  else if(pct>=.5){icon='😊';h1='Cố gắng lắm!';sub='Chơi lại để cười nhiều hơn nhé!';}
  else{icon='💪';h1='Chưa quen thôi!';sub='Lần sau con sẽ tìm được hết!';}
  $('res-ring').textContent=icon;
  $('res-ring').style.background=pct>=.7?'linear-gradient(135deg,#FFD166,#FF9F1C)':'linear-gradient(135deg,#118AB2,#9B5DE5)';
  $('res-h1').textContent=h1;
  $('res-sub').textContent=sub;
  $('score-big').textContent=score+' / '+total;

  const sr=$('stars-row');sr.innerHTML='';
  const numStars=pct>=.9?3:pct>=.6?2:pct>=.3?1:0;
  for(let i=0;i<3;i++){
    const s=document.createElement('div');s.className='s-star';s.textContent='⭐';
    sr.appendChild(s);
    if(i<numStars)setTimeout(()=>{s.classList.add('lit');if(i===0)confetti();},300+i*300);
  }
}

/* ===== INIT ===== */
initCats();
/* Đã gỡ bỏ block event preventDefault làm hỏng Safari iPad */
</script>
