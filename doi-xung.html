<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Hình Đối Xứng</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FEF9F0; --card: #fff; --tx: #1E1E2E; 
    --primary: #C084FC; --success: #44BE5A; --error: #E84444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg); font-family: 'Nunito', sans-serif;
    color: var(--tx); height: 100vh; display: flex; flex-direction: column;
    overflow: hidden; user-select: none; -webkit-user-select: none;
  }
  
  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 15px 20px; background: var(--card); box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  }
  .back-btn {
    font-size: 1.2rem; font-weight: 800; color: #6B6B80; text-decoration: none;
    background: #f0f4f8; padding: 8px 16px; border-radius: 20px; border: none; cursor: pointer;
  }
  .back-btn:active { transform: scale(0.95); }
  .title { font-size: 1.4rem; font-weight: 900; color: var(--primary); }
  .stars { font-size: 1.5rem; letter-spacing: 2px; }

  /* Game Area */
  .game-area {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 20px; width: 100%; max-width: 800px; margin: 0 auto;
  }
  
  .instruction { font-size: 1.4rem; font-weight: 800; color: #6B6B80; margin-bottom: 40px; text-align: center; }

  /* Puzzle Board */
  .puzzle-board {
    display: flex; width: 200px; height: 200px; margin-bottom: 60px;
    background: var(--card); border-radius: 30px;
    box-shadow: 0 10px 30px rgba(192, 132, 252, 0.2);
    position: relative; border: 4px solid #EAD9FF;
  }
  
  /* Trục đối xứng (Gương) */
  .puzzle-board::after {
    content: ''; position: absolute; left: 50%; top: -10px; bottom: -10px;
    width: 4px; background: #C084FC; transform: translateX(-50%);
    border-radius: 4px; z-index: 5;
  }

  .half {
    width: 50%; height: 100%; position: relative; overflow: hidden;
  }
  
  .left-half { border-radius: 26px 0 0 26px; }
  .right-half { border-radius: 0 26px 26px 0; background: #F8F4FF; }
  
  /* Chứa Emoji gốc, kích thước bằng cả board để cắt đôi */
  .emoji-wrapper {
    position: absolute; width: 200px; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 130px; line-height: 1;
  }
  
  /* Định vị để cắt nửa trái/phải */
  .left-half .emoji-wrapper { left: 0; }
  .right-half .emoji-wrapper { right: 0; display: none; } /* Ẩn đi chờ bé chọn */
  
  .question-mark {
    position: absolute; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 4rem; font-weight: 900; color: #C084FC; opacity: 0.5;
  }

  /* Options */
  .options-row { display: flex; gap: 25px; flex-wrap: wrap; justify-content: center; }
  .option-btn {
    width: 100px; height: 160px; background: var(--card); border-radius: 25px;
    box-shadow: 0 8px 0 #E2E8F0; border: 3px solid #E2E8F0; cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    position: relative; overflow: hidden;
  }
  .option-btn:active { transform: translateY(8px); box-shadow: 0 0 0 #E2E8F0; }
  
  .option-btn .emoji-wrapper {
    width: 200px; right: 0; /* Ép hiển thị nửa bên phải của Emoji */
  }

  /* Animations & States */
  .correct-ans { border-color: var(--success); background: #D6F5DC; animation: bounce 0.6s ease; }
  .wrong-ans { border-color: var(--error); background: #FFE5D8; animation: shake 0.4s ease; }
  .puzzle-board.solved { border-color: var(--success); box-shadow: 0 10px 30px rgba(68, 190, 90, 0.3); animation: bounce 0.6s ease; }
  .puzzle-board.solved::after { display: none; } /* Ẩn trục đối xứng khi ghép xong */

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
  }
  @keyframes bounce {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  /* Victory Screen */
  .victory {
    display: none; flex-direction: column; align-items: center; justify-content: center;
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(254, 249, 240, 0.95); z-index: 10;
  }
  .victory h1 { font-size: 3rem; color: #C084FC; margin-bottom: 20px; animation: bounce 1s infinite; }
  .replay-btn {
    font-size: 1.5rem; font-weight: 800; background: var(--success); color: white;
    padding: 15px 40px; border-radius: 30px; border: none; cursor: pointer;
    box-shadow: 0 6px 0 #2A9440; font-family: 'Nunito', sans-serif;
  }
  .replay-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #2A9440; }

  /* Responsive for smaller screens */
  @media (max-width: 600px) {
    .puzzle-board { width: 160px; height: 160px; margin-bottom: 40px; }
    .emoji-wrapper { width: 160px; font-size: 110px; }
    .option-btn { width: 80px; height: 130px; }
    .option-btn .emoji-wrapper { width: 160px; }
    .instruction { font-size: 1.1rem; }
  }
</style>
</head>
<body>

  <div class="header">
    <button class="back-btn" onclick="window.location.href='index.html'">◂ Quay lại</button>
    <div class="title">Hình Đối Xứng</div>
    <div class="stars" id="star-display"></div>
  </div>

  <div class="game-area">
    <div class="instruction">Bé hãy tìm một nửa hình trong gương nhé! 🪞</div>
    
    <div class="puzzle-board" id="board">
      <div class="half left-half">
        <div class="emoji-wrapper" id="left-emoji">🦋</div>
      </div>
      <div class="half right-half">
        <div class="question-mark" id="question-mark">?</div>
        <div class="emoji-wrapper" id="right-emoji">🦋</div>
      </div>
    </div>

    <div class="options-row" id="options-container">
      </div>
  </div>

  <div class="victory" id="victory-screen">
    <h1>🎉 Bé Giỏi Quá! 🌟</h1>
    <button class="replay-btn" onclick="initGame()">Chơi lại nhé</button>
  </div>

<script>
  // Chỉ chọn những Emoji có tính đối xứng trục hoàn hảo
  const allSymmetricEmojis = ['🦋', '🐞', '🦉', '🐸', '🐻', '🐯', '🐷', '🦊', '🦀', '🌻', '🦇', '🤖', '👾', '🎃'];

  let currentLevel = 0;
  let totalLevels = 5;
  let isAnimating = false;
  let correctEmoji = '';

  const leftEmojiEl = document.getElementById('left-emoji');
  const rightEmojiEl = document.getElementById('right-emoji');
  const questionMarkEl = document.getElementById('question-mark');
  const boardEl = document.getElementById('board');
  const optionsContainer = document.getElementById('options-container');
  const starDisplay = document.getElementById('star-display');
  const victoryScreen = document.getElementById('victory-screen');

  function shuffle(array) {
    let currentIndex = array.length, randomIndex;
    while (currentIndex != 0) {
      randomIndex = Math.floor(Math.random() * currentIndex);
      currentIndex--;
      [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
    }
    return array;
  }

  function initGame() {
    currentLevel = 0;
    victoryScreen.style.display = 'none';
    updateStars();
    loadLevel();
  }

  function updateStars() {
    starDisplay.innerHTML = '⭐'.repeat(currentLevel);
  }

  function loadLevel() {
    isAnimating = false;
    optionsContainer.innerHTML = '';
    
    // Reset bảng ghép
    boardEl.classList.remove('solved');
    rightEmojiEl.style.display = 'none';
    questionMarkEl.style.display = 'flex';

    // Lấy 3 emoji ngẫu nhiên cho màn này
    const shuffledEmojis = shuffle([...allSymmetricEmojis]);
    correctEmoji = shuffledEmojis[0];
    const wrong1 = shuffledEmojis[1];
    const wrong2 = shuffledEmojis[2];

    // Đặt hình vào bảng ghép bên trái
    leftEmojiEl.innerText = correctEmoji;
    rightEmojiEl.innerText = correctEmoji;

    // Tạo các nút đáp án (Bao gồm 1 đúng, 2 sai)
    const options = shuffle([correctEmoji, wrong1, wrong2]);
    
    options.forEach(emoji => {
      const btn = document.createElement('div');
      btn.className = 'option-btn';
      
      // Tạo khung hiển thị nửa bên phải của emoji đáp án
      const wrapper = document.createElement('div');
      wrapper.className = 'emoji-wrapper';
      wrapper.innerText = emoji;
      
      btn.appendChild(wrapper);
      btn.onclick = () => checkAnswer(btn, emoji);
      optionsContainer.appendChild(btn);
    });
  }

  function checkAnswer(btnEl, selectedEmoji) {
    if (isAnimating) return;

    if (selectedEmoji === correctEmoji) {
      isAnimating = true;
      btnEl.classList.add('correct-ans');
      
      // Hiển thị nửa bên phải trên bảng chính
      questionMarkEl.style.display = 'none';
      rightEmojiEl.style.display = 'flex';
      boardEl.classList.add('solved');

      // Đợi 1.2s rồi chuyển màn
      setTimeout(() => {
        currentLevel++;
        updateStars();
        if (currentLevel < totalLevels) {
          loadLevel();
        } else {
          showVictory();
        }
      }, 1200);

    } else {
      // Đáp án sai
      isAnimating = true;
      btnEl.classList.add('wrong-ans');
      
      setTimeout(() => {
        btnEl.classList.remove('wrong-ans');
        isAnimating = false;
      }, 500);
    }
  }

  function showVictory() {
    victoryScreen.style.display = 'flex';
  }

  window.onload = initGame;

</script>
</body>
</html>
